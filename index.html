<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PDF 閱讀器">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#cc8b3c">
<title>PDF 閱讀器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Claude brand palette */
  --bg:          #0d0d0d;
  --surface:     #1a1a1a;
  --panel:       #222222;
  --border:      #333333;
  --accent:      #cc8b3c;   /* Claude orange */
  --accent-soft: #e8a85a;
  --accent-dim:  #8a5a1e;
  --text:        #f0ede8;
  --text-muted:  #888580;
  --canvas-bg:   #fafaf8;
  --shadow:      rgba(0,0,0,0.6);
  --chat-w:      320px;
  --toolbar-h:   56px;

  /* Safe area for iPad notch / home bar */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif TC', -apple-system, serif;
  /* Prevent Safari bounce / overscroll */
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  /* Prevent callout on long press */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── Toolbar collapsed state ── */
#toolbar-wrap.collapsed {
  height: auto;
  border-bottom: none;
  background: transparent;
  box-shadow: none;
  position: fixed;
  top: calc(var(--safe-top) + 10px);
  left: calc(var(--safe-left) + 10px);
  z-index: 100;
  width: auto;
}
#toolbar-wrap.collapsed::before,
#toolbar-wrap.collapsed::after { display: none; }
#toolbar-wrap.collapsed #toolbar {
  display: none;
}
#toolbar-wrap.collapsed #toolbar-toggle {
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: 0 4px 16px var(--shadow);
  font-size: 18px;
}

/* toggle button always visible */
#toolbar-toggle {
  width: 32px; height: 32px; border-radius: 10px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; flex-shrink: 0;
  transition: background .15s, transform .2s;
  -webkit-tap-highlight-color: transparent;
}
#toolbar-toggle:active { transform: scale(0.9); }
#toolbar-wrap {
  position: relative;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  height: var(--toolbar-h);
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--border), 0 4px 20px var(--shadow);
  z-index: 20;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  display: flex; align-items: center;
  padding: 0 8px;
  gap: 4px;
  overflow: hidden;
}

/* Fade edges to hint scrollability */
#toolbar-wrap::before,
#toolbar-wrap::after {
  content: '';
  position: absolute; top: 0; bottom: 0; width: 32px;
  pointer-events: none; z-index: 2;
  transition: opacity .2s;
}
#toolbar-wrap::before {
  left: 46px;
  background: linear-gradient(to right, var(--panel) 0%, transparent 100%);
}
#toolbar-wrap::after {
  right: 0;
  background: linear-gradient(to left, var(--panel) 0%, transparent 100%);
}
#toolbar-wrap.at-start::before { opacity: 0; }
#toolbar-wrap.at-end::after   { opacity: 0; }

/* ── Toolbar (scrollable inner) ── */
#toolbar {
  flex: 1;
  height: 100%;
  display: flex; align-items: center; gap: 6px;
  padding: 0 8px;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
  -ms-overflow-style: none;
  touch-action: pan-x;
}
#toolbar::-webkit-scrollbar { display: none; }
#toolbar > * { flex-shrink: 0; }

.toolbar-brand {
  display: flex; align-items: center; gap: 8px; margin-right: 4px;
}
.brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, #b86f20 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(204,139,60,.4);
}
.brand-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  letter-spacing: -0.02em;
}

.sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.spacer { display: none; }

/* Buttons — larger tap targets for iPad */
label.btn, button.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px; font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: background .12s, border-color .12s, color .12s, transform .08s;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
  -webkit-user-select: none; user-select: none;
  min-height: 36px;
  /* Better tap feel on iOS */
  -webkit-tap-highlight-color: transparent;
}
label.btn:active, button.btn:active {
  background: var(--border);
  transform: scale(0.96);
}
button.btn:disabled { opacity: .3; pointer-events: none; }
#file-input { display: none; }

#page-info, #zoom-display {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text-muted); white-space: nowrap; text-align: center;
}
#page-info { min-width: 72px; }
#zoom-display { min-width: 38px; }

.mode-btn { padding: 7px 9px; font-size: 11px; }
.mode-btn.active {
  background: rgba(204,139,60,.18);
  border-color: var(--accent);
  color: var(--accent-soft);
}

/* ── Home screen hint banner ── */
#pwa-hint {
  background: linear-gradient(90deg, rgba(204,139,60,.12) 0%, rgba(204,139,60,.06) 100%);
  border-bottom: 1px solid rgba(204,139,60,.2);
  padding: 8px 16px;
  font-size: 12px; color: var(--accent-soft);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
#pwa-hint span { flex: 1; }
#pwa-hint button {
  background: none; border: none; color: var(--text-muted);
  font-size: 16px; cursor: pointer; padding: 0 4px;
  -webkit-tap-highlight-color: transparent;
}

/* ── Main layout ── */
#main {
  display: flex; flex: 1; overflow: hidden;
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* ── Drop Zone ── */
#drop-zone {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  margin: 24px; border-radius: 20px;
  border: 2px dashed var(--border);
  cursor: pointer;
  transition: border-color .2s, background .2s;
  -webkit-tap-highlight-color: transparent;
}
#drop-zone:active { border-color: var(--accent); background: rgba(204,139,60,.04); }
#drop-zone .dz-icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(204,139,60,.15) 0%, rgba(204,139,60,.05) 100%);
  border: 1px solid rgba(204,139,60,.2);
  display: flex; align-items: center; justify-content: center; font-size: 32px;
}
#drop-zone p { color: var(--text); font-size: 17px; font-weight: 600; }
#drop-zone span { font-size: 13px; color: var(--text-muted); }

/* ── Viewer ── */
#viewer { display: none; flex: 1; flex-direction: column; overflow: hidden; }
#canvas-area {
  flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 16px; gap: 0;
  background: var(--bg);
  /* Momentum scrolling on iOS */
  overscroll-behavior: contain;
}
.page-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.page-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: .06em; }
.page-container { position: relative; display: inline-block; }
canvas {
  display: block; background: var(--canvas-bg);
  box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
  border-radius: 3px;
}

/* Text layer */
.text-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  overflow: hidden; pointer-events: none;
}
.text-layer span {
  position: absolute; color: transparent; white-space: pre; cursor: pointer;
  transform-origin: 0% 0%; pointer-events: all; border-radius: 3px;
  transition: background .08s;
  /* Prevent iOS callout */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
}
.text-layer span.hover-hint { background: rgba(204,139,60,.15); }
.text-layer span.selected { background: rgba(204,139,60,.45) !important; }

/* Spine */
#spine {
  width: 20px; flex-shrink: 0; align-self: stretch;
  display: flex; align-items: center; justify-content: center; position: relative;
}
#spine::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
  transform: translateX(-50%); width: 2px;
  background: linear-gradient(to bottom,
    transparent 0%, rgba(204,139,60,.15) 15%,
    rgba(204,139,60,.4) 45%, rgba(204,139,60,.4) 55%,
    rgba(204,139,60,.15) 85%, transparent 100%);
  border-radius: 2px;
}
#spine.hidden { display: none; }

/* ── Selection Popup (bigger for touch) ── */
#sel-popup {
  position: fixed; z-index: 200;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 6px;
  display: none; gap: 5px; flex-direction: row; flex-wrap: wrap;
  box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 0 1px rgba(204,139,60,.15);
  max-width: 300px;
  /* iOS safe */
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}
#sel-popup.show { display: flex; }
#sel-popup button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  border-radius: 10px; padding: 10px 14px;
  font-size: 14px; font-family: system-ui, sans-serif; cursor: pointer;
  transition: background .1s; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; gap: 6px;
}
#sel-popup button:active { background: var(--accent-dim); color: var(--accent-soft); transform: scale(0.96); }

/* ── Chat Panel ── */
#chat-panel {
  width: var(--chat-w); min-width: var(--chat-w);
  background: var(--surface); border-left: 1px solid var(--border);
  display: none; flex-direction: column; overflow: hidden;
  padding-bottom: var(--safe-bottom);
}
#chat-panel.open { display: flex; }

/* On small iPads, chat panel becomes bottom sheet */
@media (max-width: 768px) {
  #chat-panel {
    position: fixed; inset: auto 0 0 0;
    width: 100%; min-width: 100%; height: 60vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 50;
    padding-bottom: var(--safe-bottom);
  }
}

#chat-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.chat-header-left { display: flex; align-items: center; gap: 8px; }
.chat-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}
#chat-header span { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
#chat-close {
  background: var(--border); border: none; color: var(--text-muted);
  width: 28px; height: 28px; border-radius: 50%; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
#chat-close:active { background: var(--accent-dim); color: var(--text); }

#chat-messages {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px; display: flex; flex-direction: column; gap: 14px;
  overscroll-behavior: contain;
}
#chat-messages::-webkit-scrollbar { display: none; }

.msg { display: flex; flex-direction: column; gap: 5px; }
.msg-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }
.msg-bubble { padding: 11px 13px; border-radius: 12px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
.msg.user .msg-bubble { background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 12px 12px 4px 12px; }
.msg.ai .msg-bubble {
  background: linear-gradient(135deg, rgba(204,139,60,.1) 0%, rgba(204,139,60,.05) 100%);
  border: 1px solid rgba(204,139,60,.2); color: var(--text);
  border-radius: 12px 12px 12px 4px;
}
.msg.ai .msg-bubble.loading { color: var(--text-muted); font-style: italic; }
.msg-quote {
  font-size: 12px; color: var(--text-muted); border-left: 2px solid var(--accent-dim);
  padding: 4px 8px; margin-bottom: 4px; font-style: italic;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  background: rgba(255,255,255,.03); border-radius: 0 4px 4px 0;
}

#chat-input-area {
  border-top: 1px solid var(--border); padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
#selected-preview {
  font-size: 12px; color: var(--accent-soft); background: rgba(204,139,60,.08);
  border-radius: 8px; padding: 8px 10px; border-left: 2px solid var(--accent-dim);
  display: none; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#selected-preview.show { display: block; }
#chat-row { display: flex; gap: 8px; align-items: flex-end; }
#chat-input {
  flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text);
  border-radius: 12px; padding: 10px 14px; font-size: 15px;
  font-family: 'Noto Serif TC', -apple-system, serif;
  resize: none; outline: none; min-height: 44px; max-height: 120px;
  transition: border-color .15s;
  -webkit-user-select: text; user-select: text;
  /* iOS keyboard handling */
  -webkit-appearance: none;
}
#chat-input:focus { border-color: var(--accent); }
#chat-send {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent) 0%, #b86f20 100%);
  border: none; color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(204,139,60,.4);
  transition: transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
}
#chat-send:active { transform: scale(0.92); box-shadow: 0 1px 4px rgba(204,139,60,.3); }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0;
  background: rgba(13,13,13,.85);
  display: none; align-items: center; justify-content: center;
  z-index: 300; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
#loading.show { display: flex; }
.loading-inner { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
.loading-inner span { font-size: 13px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar-wrap" class="at-start">
<button id="toolbar-toggle" title="收合工具列">☰</button>
<div id="toolbar">
  <div class="toolbar-brand">
    <div class="brand-icon">✦</div>
    <span class="brand-name">PDF Reader</span>
  </div>
  <div class="sep"></div>

  <label class="btn" for="file-input">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    開啟
  </label>
  <input type="file" id="file-input" accept=".pdf">

  <div class="sep"></div>
  <button class="btn" id="btn-prev">◀</button>
  <span id="page-info">— / —</span>
  <button class="btn" id="btn-next">▶</button>

  <div class="sep"></div>
  <button class="btn" id="btn-zoom-out">－</button>
  <span id="zoom-display">100%</span>
  <button class="btn" id="btn-zoom-in">＋</button>

  <div class="sep"></div>
  <button class="btn mode-btn active" id="btn-double">⊡</button>
  <button class="btn mode-btn" id="btn-single">▭</button>

  <div class="spacer"></div>
  <button class="btn mode-btn" id="btn-chat">✦ Claude</button>
</div><!-- /#toolbar -->
</div><!-- /#toolbar-wrap -->

<!-- PWA hint (shown only in Safari, not standalone) -->
<div id="pwa-hint" style="display:none">
  <span>💡 點 Safari 分享按鈕 → 「加入主畫面」，即可全螢幕使用</span>
  <button onclick="document.getElementById('pwa-hint').remove()">✕</button>
</div>

<!-- Main -->
<div id="main">

  <!-- Drop Zone -->
  <div id="drop-zone">
    <div class="dz-icon">📄</div>
    <p>點擊開啟 PDF</p>
    <span>或從 Files App 分享至此</span>
  </div>

  <!-- Viewer -->
  <div id="viewer">
    <div id="canvas-area">
      <div class="page-wrapper" id="wrap-left">
        <span class="page-label" id="label-left"></span>
        <div class="page-container">
          <canvas id="canvas-left"></canvas>
          <div class="text-layer" id="text-left"></div>
        </div>
      </div>
      <div id="spine"></div>
      <div class="page-wrapper" id="wrap-right">
        <span class="page-label" id="label-right"></span>
        <div class="page-container">
          <canvas id="canvas-right"></canvas>
          <div class="text-layer" id="text-right"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <div class="chat-header-left">
        <div class="chat-dot"></div>
        <span>Gemini 閱讀助手</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btn-apikey" title="設定 API Key" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:2px 4px;border-radius:4px;-webkit-tap-highlight-color:transparent;">🔑</button>
        <button id="chat-close">✕</button>
      </div>
    </div>

    <!-- API Key setup screen -->
    <div id="apikey-screen" style="display:none;flex-direction:column;gap:14px;padding:18px;flex:1;">
      <p style="font-size:13px;color:var(--text-muted);line-height:1.6;">輸入你的 Gemini API Key，僅儲存在此裝置本機，不會上傳到任何伺服器。</p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;">API Key</label>
        <input id="apikey-input" type="password"
          placeholder="AIza..."
          style="background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;outline:none;-webkit-user-select:text;user-select:text;-webkit-appearance:none;">
      </div>
      <div style="display:flex;gap:8px;">
        <button id="apikey-save" style="flex:1;background:linear-gradient(135deg,var(--accent),#b86f20);border:none;color:white;border-radius:10px;padding:11px;font-size:13px;cursor:pointer;font-family:'Noto Serif TC',serif;font-weight:600;">儲存</button>
        <button id="apikey-cancel" style="background:var(--panel);border:1px solid var(--border);color:var(--text-muted);border-radius:10px;padding:11px 14px;font-size:13px;cursor:pointer;">取消</button>
      </div>
      <p style="font-size:11px;color:var(--text-muted);line-height:1.6;">
        還沒有 Key？前往
        <a href="https://aistudio.google.com/apikey" style="color:var(--accent-soft);">aistudio.google.com</a>
        免費取得。
      </p>
      <button id="apikey-clear" style="background:none;border:none;color:#666;font-size:11px;cursor:pointer;text-decoration:underline;text-align:left;">清除已儲存的 Key</button>
    </div>

    <div id="chat-messages">
      <div class="msg ai">
        <span class="msg-label">Gemini</span>
        <div class="msg-bubble">你好！用 Apple Pencil 點選 PDF 文字，我可以幫你解釋、翻譯或分析內容。<br><br>點右上角 🔑 設定 Gemini API Key 後即可開始。</div>
      </div>
    </div>
    <div id="chat-input-area">
      <div id="selected-preview"></div>
      <div id="chat-row">
        <textarea id="chat-input" placeholder="輸入問題…" rows="1"></textarea>
        <button id="chat-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Selection Popup -->
<div id="sel-popup">
  <button id="pop-explain">💡 解釋</button>
  <button id="pop-translate">🌐 翻譯</button>
  <button id="pop-ask">❓ 提問</button>
  <button id="pop-send">✦ 傳送</button>
  <button id="pop-dismiss" style="color:var(--text-muted)">✕</button>
</div>

<!-- Loading -->
<div id="loading">
  <div class="loading-inner">
    <div class="spinner"></div>
    <span>載入中…</span>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── PWA detection: show hint if in Safari (not standalone) ──
const isStandalone = window.navigator.standalone === true;
const isSafari = /Safari/.test(navigator.userAgent) && /Apple Computer/.test(navigator.vendor);
if (isSafari && !isStandalone) {
  document.getElementById('pwa-hint').style.display = 'flex';
}

// ── State ──
let pdfDoc = null, currentPage = 1, zoom = 1.0, doubleMode = true;
let selectedText = '';
let chatHistory = [];

const dropZone   = document.getElementById('drop-zone');
const viewer     = document.getElementById('viewer');
const canvasL    = document.getElementById('canvas-left');
const canvasR    = document.getElementById('canvas-right');
const textL      = document.getElementById('text-left');
const textR      = document.getElementById('text-right');
const wrapR      = document.getElementById('wrap-right');
const spine      = document.getElementById('spine');
const labelL     = document.getElementById('label-left');
const labelR     = document.getElementById('label-right');
const pageInfo   = document.getElementById('page-info');
const loadingEl  = document.getElementById('loading');
const selPopup   = document.getElementById('sel-popup');
const chatPanel  = document.getElementById('chat-panel');
const chatMsgs   = document.getElementById('chat-messages');
const chatInput  = document.getElementById('chat-input');
const selPreview = document.getElementById('selected-preview');

// ── File open ──
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) loadFile(f);
});
dropZone.addEventListener('click', () => document.getElementById('file-input').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadFile(f);
});

async function loadFile(file) {
  loadingEl.classList.add('show');
  try {
    const buf = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
    currentPage = 1;
    dropZone.style.display = 'none';
    viewer.style.display = 'flex';
    await renderPages();
  } catch(e) {
    alert('無法讀取 PDF，請確認檔案格式正確。');
  }
  loadingEl.classList.remove('show');
}

// ── Render ──
async function renderPages() {
  if (!pdfDoc) return;
  loadingEl.classList.add('show');
  const total = pdfDoc.numPages;

  // Calculate zoom to fit screen
  if (zoom === 1.0) {
    const area = document.getElementById('canvas-area');
    const page = await pdfDoc.getPage(1);
    const vp = page.getViewport({ scale: 1 });
    const availW = area.clientWidth - 72; // padding + spine
    const pagesShown = doubleMode ? 2 : 1;
    zoom = Math.min((availW / pagesShown) / vp.width, 1.4);
    document.getElementById('zoom-display').textContent = Math.round(zoom * 100) + '%';
  }

  if (doubleMode) {
    wrapR.style.display = 'flex'; spine.classList.remove('hidden');
    await renderPage(currentPage, canvasL, textL);
    labelL.textContent = `第 ${currentPage} 頁`;
    const rp = currentPage + 1;
    if (rp <= total) {
      await renderPage(rp, canvasR, textR);
      labelR.textContent = `第 ${rp} 頁`;
      pageInfo.textContent = `${currentPage}–${rp} / ${total}`;
    } else {
      const ctx = canvasR.getContext('2d');
      canvasR.width = canvasL.width; canvasR.height = canvasL.height;
      ctx.fillStyle = '#fafaf8'; ctx.fillRect(0,0,canvasR.width,canvasR.height);
      textR.innerHTML = ''; labelR.textContent = '';
      pageInfo.textContent = `${currentPage} / ${total}`;
    }
  } else {
    wrapR.style.display = 'none'; spine.classList.add('hidden');
    await renderPage(currentPage, canvasL, textL);
    labelL.textContent = `第 ${currentPage} 頁`;
    pageInfo.textContent = `${currentPage} / ${total}`;
  }

  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = doubleMode ? currentPage + 2 > total : currentPage >= total;
  loadingEl.classList.remove('show');
}

async function renderPage(num, canvas, textLayer) {
  const page = await pdfDoc.getPage(num);
  const vp = page.getViewport({ scale: zoom });
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

  textLayer.innerHTML = '';
  const tc = await page.getTextContent();
  tc.items.forEach(item => {
    if (!item.str || !item.str.trim()) return;
    const span = document.createElement('span');
    span.textContent = item.str;
    span.dataset.text = item.str;

    const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
    const fontH = Math.sqrt(tx[2]*tx[2] + tx[3]*tx[3]);
    const angle = Math.atan2(tx[1], tx[0]) * (180/Math.PI);
    span.style.left = tx[4] + 'px';
    span.style.top  = (tx[5] - fontH) + 'px';
    span.style.fontSize = fontH + 'px';
    span.style.transform = `rotate(${angle}deg)`;

    // Universal: touch (Firefox/Safari/Chrome) + pointer (Pencil)
    attachSpanListeners(span);
    textLayer.appendChild(span);
  });
}

// ── Universal tap detection (Firefox + Safari + Apple Pencil) ──
// Strategy: use touchstart/touchend as primary (works everywhere),
// fall back to pointerdown only when touch events are absent (desktop mouse).
let tapTimer = null, lastTapTime = 0, lastTapSpan = null;
let activeTouchId = null; // track single finger

function attachSpanListeners(span) {
  // Touch events — reliable on both Firefox and Safari iOS
  span.addEventListener('touchstart', onSpanTouchStart, { passive: true });
  span.addEventListener('touchend',   onSpanTouchEnd,   { passive: false });
  // Pointer events — for Apple Pencil hover glow & desktop mouse fallback
  span.addEventListener('pointerenter', () => { if (e => e.pointerType !== 'touch') span.classList.add('hover-hint'); });
  span.addEventListener('pointerleave', () => span.classList.remove('hover-hint'));
  // Mouse fallback (desktop)
  span.addEventListener('mousedown', onSpanMouse, { passive: true });
}

function onSpanTouchStart(e) {
  if (e.touches.length !== 1) return;
  activeTouchId = e.touches[0].identifier;
  // store position for touchend
  this._tx = e.touches[0].clientX;
  this._ty = e.touches[0].clientY;
}

function onSpanTouchEnd(e) {
  const t = [...e.changedTouches].find(t => t.identifier === activeTouchId);
  if (!t) return;
  activeTouchId = null;

  const span = this;
  const cx = t.clientX, cy = t.clientY;

  // Ignore if finger moved too much (scroll intent)
  const dx = cx - (span._tx || cx), dy = cy - (span._ty || cy);
  if (Math.abs(dx) > 12 || Math.abs(dy) > 12) return;

  e.stopPropagation();

  const now = Date.now();
  const isDouble = (now - lastTapTime < 380) && lastTapSpan === span;
  lastTapTime = now; lastTapSpan = span;

  if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }

  if (isDouble) {
    selectParagraphNear(span, cx, cy);
    return;
  }
  tapTimer = setTimeout(() => {
    clearAllSelections();
    span.classList.add('selected');
    selectedText = span.dataset.text.trim();
    if (selectedText) showPopup(cx, cy);
  }, 60); // short delay to allow double-tap detection
}

function onSpanMouse(e) {
  // Only fires on real desktop mouse (not touch/pencil)
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  const span = this;
  const now = Date.now();
  const isDouble = (now - lastTapTime < 380) && lastTapSpan === span;
  lastTapTime = now; lastTapSpan = span;
  if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
  if (isDouble) { selectParagraphNear(span, e.clientX, e.clientY); return; }
  tapTimer = setTimeout(() => {
    clearAllSelections();
    span.classList.add('selected');
    selectedText = span.dataset.text.trim();
    if (selectedText) showPopup(e.clientX, e.clientY);
  }, 60);
}

function selectParagraphNear(refSpan, cx, cy) {
  clearAllSelections();
  const refRect = refSpan.getBoundingClientRect();
  const lineH = refRect.height * 1.5;
  const texts = [];
  document.querySelectorAll('.text-layer span').forEach(s => {
    const r = s.getBoundingClientRect();
    if (Math.abs(r.top - refRect.top) <= lineH) {
      s.classList.add('selected');
      texts.push(s.dataset.text);
    }
  });
  selectedText = texts.join(' ').trim();
  if (selectedText) showPopup(cx, cy);
}

function clearAllSelections() {
  document.querySelectorAll('.text-layer span.selected').forEach(s => s.classList.remove('selected'));
  selectedText = ''; hidePopup();
}

// Tap on background = clear selection
document.getElementById('canvas-area').addEventListener('touchend', e => {
  if (!e.target.closest('.text-layer span')) clearAllSelections();
}, { passive: true });
document.getElementById('canvas-area').addEventListener('mousedown', e => {
  if (!e.target.closest('.text-layer span')) clearAllSelections();
}, { passive: true });

// ── Swipe to turn pages ──
let touchStartX = 0, touchStartY = 0;
document.getElementById('canvas-area').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('canvas-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) document.getElementById('btn-next').click();
    else document.getElementById('btn-prev').click();
  }
}, { passive: true });

// ── Popup ──
function showPopup(x, y) {
  selPopup.classList.add('show');
  requestAnimationFrame(() => {
    const pw = selPopup.offsetWidth, ph = selPopup.offsetHeight;
    let px = x - pw / 2, py = y - ph - 18;
    if (px < 10) px = 10;
    if (px + pw > window.innerWidth - 10) px = window.innerWidth - pw - 10;
    if (py < 10) py = y + 22;
    selPopup.style.left = px + 'px';
    selPopup.style.top = py + 'px';
  });
}
function hidePopup() { selPopup.classList.remove('show'); }

document.getElementById('pop-dismiss').addEventListener('click', clearAllSelections);
document.getElementById('pop-explain').addEventListener('click', () => {
  const t = selectedText; hidePopup();
  openChat(t, '請詳細解釋這段文字的意思：');
});
document.getElementById('pop-translate').addEventListener('click', () => {
  const t = selectedText; hidePopup();
  openChat(t, '請把這段文字翻譯成繁體中文，並說明是什麼語言：');
});
document.getElementById('pop-ask').addEventListener('click', () => {
  const t = selectedText; hidePopup();
  setQuote(t); ensureChatOpen(); chatInput.focus();
});
document.getElementById('pop-send').addEventListener('click', () => {
  const t = selectedText; hidePopup();
  openChat(t, '關於這段文字，請幫我分析重點：');
});

// ── Chat ──
function ensureChatOpen() {
  if (!chatPanel.classList.contains('open')) {
    chatPanel.classList.add('open');
    document.getElementById('btn-chat').classList.add('active');
  }
}
function setQuote(text) {
  selPreview.textContent = `"${text.slice(0, 100)}${text.length > 100 ? '…' : ''}"`;
  selPreview.dataset.full = text;
  selPreview.classList.add('show');
}
function openChat(text, autoPrompt) {
  ensureChatOpen();
  setQuote(text);
  if (autoPrompt) sendMessage(autoPrompt, text);
}

document.getElementById('btn-chat').addEventListener('click', () => {
  chatPanel.classList.toggle('open');
  document.getElementById('btn-chat').classList.toggle('active');
});
document.getElementById('chat-close').addEventListener('click', () => {
  chatPanel.classList.remove('open');
  document.getElementById('btn-chat').classList.remove('active');
});

document.getElementById('chat-send').addEventListener('click', doSend);
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

function doSend() {
  const q = chatInput.value.trim(); if (!q) return;
  const quote = selPreview.classList.contains('show') ? selPreview.dataset.full : null;
  sendMessage(q, quote);
  selPreview.classList.remove('show');
  chatInput.value = '';
  chatInput.style.height = '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage(prompt, quoteText) {
  // User bubble
  const uDiv = document.createElement('div');
  uDiv.className = 'msg user';
  let html = `<span class="msg-label">你</span>`;
  if (quoteText) html += `<div class="msg-quote">${escHtml(quoteText.slice(0,120))}${quoteText.length>120?'…':''}</div>`;
  html += `<div class="msg-bubble">${escHtml(prompt)}</div>`;
  uDiv.innerHTML = html;
  chatMsgs.appendChild(uDiv);

  const content = quoteText ? `PDF 段落：\n"${quoteText}"\n\n${prompt}` : prompt;
  chatHistory.push({ role: 'user', content });

  // AI loading bubble
  const aDiv = document.createElement('div');
  aDiv.className = 'msg ai';
  aDiv.innerHTML = `<span class="msg-label">Gemini</span><div class="msg-bubble loading">思考中…</div>`;
  chatMsgs.appendChild(aDiv);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;

  // Build Gemini contents from history
  const geminiContents = chatHistory.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  try {
    const GEMINI_KEY = getApiKey();
    if (!GEMINI_KEY) {
      aDiv.querySelector('.msg-bubble').classList.remove('loading');
      aDiv.querySelector('.msg-bubble').innerHTML = '請先點右上角 🔑 設定 Gemini API Key。';
      showApiKeyScreen();
      return;
    }
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: '你是一個 PDF 閱讀助手，幫助使用者理解文件內容。請用繁體中文回答，語氣友善簡潔，必要時用條列方式呈現。' }] },
          contents: geminiContents
        })
      }
    );
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '（無法取得回應）';
    chatHistory.push({ role: 'assistant', content: reply });
    aDiv.querySelector('.msg-bubble').classList.remove('loading');
    aDiv.querySelector('.msg-bubble').textContent = reply;
  } catch {
    aDiv.querySelector('.msg-bubble').classList.remove('loading');
    aDiv.querySelector('.msg-bubble').textContent = '連線錯誤，請稍後再試。';
  }
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

// ── Navigation ──
document.getElementById('btn-prev').addEventListener('click', () => {
  if (!pdfDoc) return;
  currentPage = Math.max(1, currentPage - (doubleMode ? 2 : 1));
  renderPages();
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (!pdfDoc) return;
  const total = pdfDoc.numPages, step = doubleMode ? 2 : 1;
  if (currentPage + step <= total) { currentPage += step; renderPages(); }
});

// ── Keyboard (external keyboard on iPad) ──
document.addEventListener('keydown', e => {
  if (e.target === chatInput) return;
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   document.getElementById('btn-prev').click();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') document.getElementById('btn-next').click();
  if (e.key === '+' || e.key === '=') updateZoom(+0.15);
  if (e.key === '-') updateZoom(-0.15);
  if (e.key === 'Escape') clearAllSelections();
});

// ── Zoom ──
const zoomDisplay = document.getElementById('zoom-display');
function updateZoom(delta) {
  zoom = Math.min(3, Math.max(0.3, zoom + delta));
  zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  renderPages();
}
document.getElementById('btn-zoom-in').addEventListener('click',  () => updateZoom(+0.15));
document.getElementById('btn-zoom-out').addEventListener('click', () => updateZoom(-0.15));

// ── View Mode ──
document.getElementById('btn-double').addEventListener('click', () => {
  doubleMode = true; zoom = 1.0;
  if (currentPage % 2 === 0) currentPage = Math.max(1, currentPage - 1);
  document.getElementById('btn-double').classList.add('active');
  document.getElementById('btn-single').classList.remove('active');
  renderPages();
});
document.getElementById('btn-single').addEventListener('click', () => {
  doubleMode = false; zoom = 1.0;
  document.getElementById('btn-single').classList.add('active');
  document.getElementById('btn-double').classList.remove('active');
  renderPages();
});

// ── Pinch to zoom (iOS native gesture) ──
let initDist = 0, initZoom = 1;
document.getElementById('canvas-area').addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    initDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    initZoom = zoom;
  }
}, { passive: true });
document.getElementById('canvas-area').addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    zoom = Math.min(3, Math.max(0.3, initZoom * (dist / initDist)));
    zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  }
}, { passive: true });
document.getElementById('canvas-area').addEventListener('touchend', e => {
  if (e.touches.length < 2 && initDist > 0) {
    initDist = 0; renderPages();
  }
}, { passive: true });

// ── Service Worker (PWA offline support) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── API Key (stored in localStorage, never leaves device) ──
const STORAGE_KEY = 'gemini_api_key';

function getApiKey() {
  return localStorage.getItem(STORAGE_KEY) || '';
}
function saveApiKey(key) {
  localStorage.setItem(STORAGE_KEY, key.trim());
}
function clearApiKey() {
  localStorage.removeItem(STORAGE_KEY);
}

const apikeyScreen  = document.getElementById('apikey-screen');
const chatMessages  = document.getElementById('chat-messages');
const chatInputArea = document.getElementById('chat-input-area');

function showApiKeyScreen() {
  apikeyScreen.style.display = 'flex';
  chatMessages.style.display = 'none';
  chatInputArea.style.display = 'none';
  const existing = getApiKey();
  document.getElementById('apikey-input').value = existing
    ? existing.slice(0,6) + '••••••••••••' : '';
}
function hideApiKeyScreen() {
  apikeyScreen.style.display = 'none';
  chatMessages.style.display = 'flex';
  chatInputArea.style.display = 'flex';
}

document.getElementById('btn-apikey').addEventListener('click', () => {
  ensureChatOpen();
  showApiKeyScreen();
});
document.getElementById('apikey-cancel').addEventListener('click', hideApiKeyScreen);
document.getElementById('apikey-save').addEventListener('click', () => {
  const val = document.getElementById('apikey-input').value.trim();
  if (!val || val.includes('••')) { hideApiKeyScreen(); return; }
  saveApiKey(val);
  hideApiKeyScreen();
  // Show confirmation in chat
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<span class="msg-label">系統</span><div class="msg-bubble">✅ API Key 已儲存在本機，可以開始使用了！</div>`;
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
});
document.getElementById('apikey-clear').addEventListener('click', () => {
  clearApiKey();
  document.getElementById('apikey-input').value = '';
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<span class="msg-label">系統</span><div class="msg-bubble">🗑 API Key 已清除。</div>`;
  chatMsgs.appendChild(div);
  hideApiKeyScreen();
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
});

// Focus input properly on iOS
document.getElementById('apikey-input').addEventListener('touchend', function() {
  this.removeAttribute('readonly');
  this.focus();
});

// ── Toolbar toggle (收合到角落) ──
const toolbarWrap = document.getElementById('toolbar-wrap');
const toolbarToggle = document.getElementById('toolbar-toggle');
toolbarToggle.addEventListener('click', () => {
  const collapsed = toolbarWrap.classList.toggle('collapsed');
  toolbarToggle.textContent = collapsed ? '☰' : '✕';
  toolbarToggle.title = collapsed ? '展開工具列' : '收合工具列';
});

// ── Toolbar scroll fade indicators ──
(function() {
  const tb   = document.getElementById('toolbar');
  const wrap = document.getElementById('toolbar-wrap');
  function update() {
    const atStart = tb.scrollLeft <= 4;
    const atEnd   = tb.scrollLeft + tb.clientWidth >= tb.scrollWidth - 4;
    wrap.classList.toggle('at-start', atStart);
    wrap.classList.toggle('at-end',   atEnd);
  }
  tb.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
})();
</script>
</body>
